name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Collect site files
        run: |
          set -e
          mkdir -p _site
          cp index.html _site/
          cp design.md  _site/
          touch _site/.nojekyll
          cp -r assets _site/
          cp -r data   _site/
          for d in academic-ai-prompts feedback seminar survey uploads; do
            [ -d "$d" ] && cp -r "$d" _site/ || true
          done
          echo "Site files collected:"
          ls _site/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        uses: actions/deploy-pages@v4
