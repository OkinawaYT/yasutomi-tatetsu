name: Sync Researchmap Data

on:
  schedule:
    - cron: '0 16 * * *'   # 毎日 AM1:00 JST (= UTC 16:00)
  workflow_dispatch:         # 手動実行可

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --no-dev

      - name: Fetch from Researchmap API
        run: uv run researchmap/src/getResearchmapData.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync Researchmap data"
          file_pattern: 'data/*.json'
