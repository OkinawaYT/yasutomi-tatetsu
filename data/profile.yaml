bio:
  en: >
    My research focuses on **first-principles electronic structure calculations**
    of surfaces, interfaces, and magnetic materials (hard magnets and superconductors).
    I investigate the physical properties of these systems from first principles to
    understand and design novel functional materials.

    In parallel, I work on **Institutional Research (IR)** and **EdTech** to improve
    the quality of higher education.
    Please feel free to reach out for collaboration.
  ja: >
    **第一原理電子状態計算**を用いて、表面・界面・磁性材料（硬磁石・超伝導体）の
    物性解明に取り組んでいます。計算科学的アプローチから機能性材料の設計・理解を
    目指しています。

    また、**インスティテューショナル・リサーチ（IR）** および **EdTech** を通じた
    高等教育の質向上にも取り組んでいます。
    研究・教育に関するご協力・ご相談をお気軽にどうぞ。

