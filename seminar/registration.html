<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>参加申込状況</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 space-y-6">

  <!-- Loading -->
  <div id="s-loading" class="text-center py-24">
    <div class="inline-block w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-slate-500 text-sm">データを読み込み中...</p>
  </div>

  <!-- Error -->
  <div id="s-error" class="hidden bg-red-50 border border-red-200 rounded-2xl p-6">
    <p class="font-bold text-red-700 mb-1">エラー</p>
    <p id="error-msg" class="text-red-600 text-sm"></p>
    <p class="text-xs text-red-400 mt-3">
      ※ GASのデプロイ設定と、スプレッドシートに <code>{seminar_id}_registrations</code> シートが存在するか確認してください。
    </p>
  </div>

  <!-- Main -->
  <div id="s-main" class="hidden space-y-6">

    <!-- Header -->
    <div class="flex flex-wrap items-start justify-between gap-3">
      <div>
        <h1 id="el-title" class="text-xl font-bold text-slate-800"></h1>
        <p class="text-sm text-slate-400 mt-1">参加申込状況</p>
      </div>
      <div class="flex gap-2">
        <a id="link-dashboard" href="#" class="text-xs text-slate-500 hover:text-indigo-600 border border-slate-200 hover:border-indigo-300 rounded-lg px-3 py-2 transition">
          回答集計へ →
        </a>
        <button onclick="refreshData()" class="text-xs text-slate-500 hover:text-indigo-600 border border-slate-200 hover:border-indigo-300 rounded-lg px-3 py-2 transition">
          ↻ 更新
        </button>
      </div>
    </div>

    <!-- KPI カード -->
    <div id="el-kpi" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>

    <!-- 地図 + 棒グラフ -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="p-4 border-b border-slate-100">
          <h2 class="text-sm font-semibold text-slate-700">参加大学の地理分布</h2>
          <p class="text-xs text-slate-400 mt-0.5">円の大きさ・色が申込者数を表します（緑 → 黄 → 赤の順に多い）</p>
        </div>
        <div id="el-map" style="height:320px"></div>
      </div>

      <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm flex flex-col">
        <h2 class="text-sm font-semibold text-slate-700 mb-3">区分別申込者数</h2>
        <div class="relative flex-1" style="min-height:240px"><canvas id="el-chart"></canvas></div>
      </div>

    </div>

    <!-- 大学一覧テーブル -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="p-4 border-b border-slate-100 flex items-center justify-between">
        <h2 class="font-semibold text-slate-700 text-sm">申込大学一覧</h2>
        <p id="el-updated" class="text-xs text-slate-400"></p>
      </div>
      <div class="overflow-x-auto">
        <table id="el-table" class="w-full text-xs"></table>
      </div>
    </div>

  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let GAS_URL   = '';
let seminarId = '';
let rows      = [];
let barChart  = null;
let map       = null;

// ============================================================
// INIT
// ============================================================
async function init() {
  const params = new URLSearchParams(location.search);
  seminarId = params.get('id') || '';

  if (!seminarId) {
    showError('URLに ?id= パラメータが必要です。例：?id=kodaikyo_202607');
    return;
  }

  try {
    const r = await fetch('config.json');
    if (r.ok) {
      const cfg = await r.json();
      if (cfg.gas_url && cfg.gas_url !== 'YOUR_GAS_URL_HERE') GAS_URL = cfg.gas_url;

      const session = (cfg.sessions || []).find(s => s.id === seminarId);
      if (session) {
        el('el-title').textContent = session.title;
        document.title = `${session.title} - 参加申込状況`;
      } else {
        el('el-title').textContent = seminarId;
        document.title = `${seminarId} - 参加申込状況`;
      }
    }
  } catch (_) {}

  el('link-dashboard').href = `dashboard.html?id=${seminarId}`;

  await refreshData();
}

// ============================================================
// データ取得
// ============================================================
async function refreshData() {
  if (!GAS_URL) {
    showError('config.json の gas_url が設定されていません。');
    return;
  }

  try {
    const result = await fetchJsonp(
      `${GAS_URL}?action=getRegistrations&seminar_id=${encodeURIComponent(seminarId)}`
    );
    rows = result.rows || [];
  } catch (e) {
    showError(`データ取得失敗：${e.message}`);
    return;
  }

  if (!rows.length) {
    showError(`スプレッドシートに "${seminarId}_registrations" シートが見つからないか、データが空です。`);
    return;
  }

  el('el-updated').textContent = `最終更新：${new Date().toLocaleString('ja-JP')}`;
  show('s-main');
  hide('s-loading');

  renderKPI();
  renderChart();
  renderTable();
  requestAnimationFrame(renderMap);
}

function fetchJsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = `_jsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const timeout = setTimeout(() => {
      delete window[cb];
      reject(new Error('タイムアウト（10秒）'));
    }, 10000);

    window[cb] = data => {
      clearTimeout(timeout);
      delete window[cb];
      document.head.removeChild(script);
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = `${url}&callback=${cb}`;
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[cb];
      reject(new Error('スクリプト読み込みエラー'));
    };
    document.head.appendChild(script);
  });
}

// ============================================================
// KPI カード
// ============================================================
function renderKPI() {
  const unis  = [...new Set(rows.map(r => r['大学名']).filter(Boolean))];
  const total = rows.reduce((s, r) => s + (parseInt(r['人数']) || 0), 0);
  const cats  = [...new Set(rows.map(r => r['区分']).filter(Boolean))];

  el('el-kpi').innerHTML = [
    { label: '申込大学数', value: unis.length + '校',  color: 'bg-blue-50 border-blue-100 text-blue-700' },
    { label: '総申込者数', value: total + '名',         color: 'bg-emerald-50 border-emerald-100 text-emerald-700' },
    { label: '申込区分数', value: cats.length + '区分', color: 'bg-violet-50 border-violet-100 text-violet-700' },
  ].map(c => `
    <div class="${c.color} rounded-2xl border p-4 shadow-sm">
      <div class="text-3xl font-bold">${c.value}</div>
      <div class="text-xs mt-1 opacity-60">${c.label}</div>
    </div>`).join('');
}

// ============================================================
// 区分別棒グラフ
// ============================================================
function renderChart() {
  const catMap = {};
  rows.forEach(r => {
    const cat = r['区分'];
    if (!cat) return;
    catMap[cat] = (catMap[cat] || 0) + (parseInt(r['人数']) || 0);
  });

  if (barChart) { barChart.destroy(); barChart = null; }

  const ctx = el('el-chart').getContext('2d');
  barChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(catMap),
      datasets: [{
        label: '申込者数（名）',
        data: Object.values(catMap),
        backgroundColor: '#6366f1',
        borderRadius: 6,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.raw}名` } },
      },
      scales: {
        x: { beginAtZero: true, ticks: { precision: 0 } },
        y: { ticks: { font: { size: 11 } } },
      },
    },
  });
}

// ============================================================
// 地図（Leaflet）
// ============================================================
function renderMap() {
  const uniMap = {};
  rows.forEach(r => {
    const name = r['大学名'];
    if (!name || uniMap[name]) return;
    uniMap[name] = {
      lat:     parseFloat(r['緯度']),
      lng:     parseFloat(r['経度']),
      total:   parseInt(r['合計']) || 0,
      address: r['住所'] || '',
    };
  });

  const unis = Object.entries(uniMap).filter(([, u]) => !isNaN(u.lat) && !isNaN(u.lng));
  if (!unis.length) return;

  if (map) { map.remove(); map = null; }

  map = L.map('el-map').setView([36.5, 136.0], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 18,
  }).addTo(map);

  const maxTotal = Math.max(...unis.map(([, u]) => u.total));

  unis.forEach(([name, u]) => {
    const ratio  = maxTotal > 0 ? u.total / maxTotal : 0;
    const color  = ratio < 0.33 ? '#86efac' : ratio < 0.67 ? '#fde68a' : '#fca5a5';
    const radius = 6 + Math.round(ratio * 10);

    L.circleMarker([u.lat, u.lng], {
      radius, fillColor: color, fillOpacity: 0.85, color: '#fff', weight: 1.5,
    })
    .bindPopup(
      `<strong>${esc(name)}</strong><br>申込者数：${u.total}名` +
      (u.address ? `<br><span style="color:#6b7280;font-size:11px">${esc(u.address)}</span>` : '')
    )
    .addTo(map);
  });
}

// ============================================================
// 大学一覧テーブル
// ============================================================
function renderTable() {
  const tbl = el('el-table');

  // 大学ごとに合計を集計（合計列がある前提、なければ人数の合算）
  const uniMap = {};
  rows.forEach(r => {
    const name = r['大学名'];
    if (!name) return;
    if (!uniMap[name]) {
      uniMap[name] = { name, address: r['住所'] || '', total: 0, cats: {} };
    }
    const count = parseInt(r['人数']) || 0;
    uniMap[name].total += count;
    const cat = r['区分'] || '—';
    uniMap[name].cats[cat] = (uniMap[name].cats[cat] || 0) + count;
  });

  const sorted = Object.values(uniMap).sort((a, b) => b.total - a.total);
  const allCats = [...new Set(rows.map(r => r['区分']).filter(Boolean))];

  const thead = `
    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0">
      <tr>
        <th class="px-3 py-2 text-left text-xs font-semibold text-slate-500">#</th>
        <th class="px-3 py-2 text-left text-xs font-semibold text-slate-500 whitespace-nowrap">大学名</th>
        ${allCats.map(c => `<th class="px-3 py-2 text-right text-xs font-semibold text-slate-500 whitespace-nowrap">${esc(c)}</th>`).join('')}
        <th class="px-3 py-2 text-right text-xs font-semibold text-slate-500 whitespace-nowrap">合計</th>
      </tr>
    </thead>`;

  const tbody = `
    <tbody class="divide-y divide-slate-100">
      ${sorted.map((u, i) => `
        <tr class="hover:bg-slate-50 transition-colors">
          <td class="px-3 py-2.5 text-slate-400">${i + 1}</td>
          <td class="px-3 py-2.5 font-medium text-slate-700 whitespace-nowrap">${esc(u.name)}</td>
          ${allCats.map(c => `<td class="px-3 py-2.5 text-right text-slate-600">${u.cats[c] ?? '<span class="text-slate-300">—</span>'}</td>`).join('')}
          <td class="px-3 py-2.5 text-right font-bold text-indigo-700">${u.total}</td>
        </tr>`).join('')}
    </tbody>`;

  tbl.innerHTML = thead + tbody;
}

// ============================================================
// ユーティリティ
// ============================================================
function el(id)   { return document.getElementById(id); }
function show(id) { el(id).classList.remove('hidden'); }
function hide(id) { el(id).classList.add('hidden'); }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showError(msg) {
  hide('s-loading');
  show('s-error');
  el('error-msg').textContent = msg;
}

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
