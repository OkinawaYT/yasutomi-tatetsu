<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>集計ダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
<div class="max-w-5xl mx-auto px-4 py-8 space-y-6">

  <!-- Loading -->
  <div id="s-loading" class="text-center py-24">
    <div class="inline-block w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-slate-500 text-sm">データを読み込み中...</p>
  </div>

  <!-- Error -->
  <div id="s-error" class="hidden bg-red-50 border border-red-200 rounded-2xl p-6">
    <p class="font-bold text-red-700 mb-1">エラー</p>
    <p id="error-msg" class="text-red-600 text-sm"></p>
    <p class="text-xs text-red-400 mt-3">
      ※ GASのデプロイ設定を確認してください。「次のユーザーとして実行: 自分」「アクセスできるユーザー: 全員」が必要です。
    </p>
  </div>

  <!-- Main -->
  <div id="s-main" class="hidden space-y-6">

    <!-- Header -->
    <div class="flex flex-wrap items-start justify-between gap-3">
      <div>
        <h1 id="el-title" class="text-xl font-bold text-slate-800"></h1>
        <p class="text-sm text-slate-400 mt-1">集計ダッシュボード</p>
      </div>
      <div class="flex gap-2">
        <a id="link-form" href="#" class="text-xs text-slate-500 hover:text-indigo-600 border border-slate-200 hover:border-indigo-300 rounded-lg px-3 py-2 transition">
          回答フォームへ →
        </a>
        <button onclick="refreshData()" class="text-xs text-slate-500 hover:text-indigo-600 border border-slate-200 hover:border-indigo-300 rounded-lg px-3 py-2 transition">
          ↻ 更新
        </button>
      </div>
    </div>

    <!-- Stats カード -->
    <div id="el-stats" class="grid grid-cols-2 sm:grid-cols-4 gap-3"></div>

    <!-- 絞り込み -->
    <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm space-y-3">
      <div class="flex flex-wrap gap-3 items-center">
        <span class="text-xs font-semibold text-slate-500 uppercase tracking-widest">絞り込み</span>
        <div class="flex items-center gap-2">
          <label class="text-xs text-slate-400">Day</label>
          <select id="filter-day" onchange="onDayChange()"
            class="text-sm border border-slate-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-indigo-300">
            <option value="">全て</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-xs text-slate-400">Case</label>
          <select id="filter-case" onchange="onCaseChange()"
            class="text-sm border border-slate-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-indigo-300">
            <option value="">全て</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-xs text-slate-400">設問</label>
          <select id="filter-question" onchange="applyFilter()"
            class="text-sm border border-slate-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-indigo-300 max-w-[220px]">
            <option value="">全設問</option>
          </select>
        </div>
        <div class="flex items-center gap-2 ml-auto">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input id="search-input" type="text" placeholder="キーワード検索..."
            oninput="onSearch()"
            class="text-sm border border-slate-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-indigo-300 w-40">
        </div>
        <span id="filter-count" class="text-xs text-slate-400"></span>
      </div>
    </div>

    <!-- ラジオ集計グラフ -->
    <div>
      <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-widest mb-3">選択式の集計</h2>
      <div id="el-charts" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      <p id="el-charts-empty" class="hidden text-sm text-slate-400 text-center py-6">該当するデータがありません</p>
    </div>

    <!-- テキスト回答 -->
    <div>
      <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-widest mb-3">テキスト回答</h2>
      <div id="el-texts" class="space-y-4"></div>
      <p id="el-texts-empty" class="hidden text-sm text-slate-400 text-center py-6">該当するデータがありません</p>
    </div>

    <!-- 回答一覧テーブル -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="p-4 border-b border-slate-100">
        <h2 class="font-semibold text-slate-700 text-sm">回答一覧</h2>
        <p id="el-updated" class="text-xs text-slate-400 mt-0.5"></p>
      </div>
      <div class="overflow-x-auto">
        <table id="el-table" class="w-full text-xs"></table>
      </div>
    </div>

  </div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let GAS_URL      = '';
let seminarData  = null;
let seminarId    = '';
let allRows      = [];
let allHeaders   = [];
let fieldMap     = {};  // field_id → question object
let caseFieldMap = {};  // "d{day}_{case_id}" → [field_id, ...]
let charts       = [];
let searchQuery  = '';

// ============================================================
// INIT
// ============================================================
async function init() {
  const params = new URLSearchParams(location.search);
  seminarId = params.get('id') || '';

  if (!seminarId) {
    showError('URLに ?id= パラメータが必要です。例：?id=kodaikyo_202607');
    return;
  }

  // config.json から GAS URL を読み込む
  try {
    const r = await fetch('config.json');
    if (r.ok) {
      const cfg = await r.json();
      if (cfg.gas_url && cfg.gas_url !== 'YOUR_GAS_URL_HERE') GAS_URL = cfg.gas_url;
    }
  } catch (_) {}

  // セミナーJSON を読み込む（フィールド定義のために必要）
  try {
    const r = await fetch(`data/${seminarId}.json`);
    if (!r.ok) throw new Error(`data/${seminarId}.json が見つかりません`);
    seminarData = await r.json();
  } catch (e) {
    showError(e.message);
    return;
  }

  // fieldMap（全フィールド）と caseFieldMap（case別フィールドID一覧）を構築
  seminarData.program.forEach(day => {
    day.cases.forEach(c => {
      const key = `d${day.day}_${c.id}`;
      caseFieldMap[key] = [];
      c.questions.forEach(q => {
        fieldMap[q.field_id] = q;
        caseFieldMap[key].push(q.field_id);
        if (q.type === 'matrix_parts') {
          q.fields.forEach(f => {
            const subId = `${q.field_id}__${f.key}`;
            fieldMap[subId] = { type: 'text', label: `${q.label} › ${f.label.split('：')[0]}` };
            caseFieldMap[key].push(subId);
          });
        }
      });
    });
  });

  // ページ設定
  el('el-title').textContent = seminarData.seminar_title;
  document.title = `${seminarData.seminar_title} - ダッシュボード`;
  el('link-form').href = `index.html?id=${seminarId}`;

  setupFilters();
  await refreshData();
}

// ============================================================
// データ取得（JSONP でCORSを回避）
// ============================================================
async function refreshData() {
  if (!GAS_URL) {
    showError('config.json の gas_url が設定されていません。GASをデプロイして設定してください。');
    return;
  }

  try {
    const result = await fetchJsonp(
      `${GAS_URL}?action=getResults&seminar_id=${encodeURIComponent(seminarId)}`
    );
    allRows    = result.rows    || [];
    allHeaders = result.headers || [];
  } catch (e) {
    showError(`データ取得失敗：${e.message}`);
    return;
  }

  el('el-updated').textContent = `最終更新：${new Date().toLocaleString('ja-JP')}`;
  show('s-main');
  hide('s-loading');
  applyFilter();
}

function fetchJsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = `_jsonp_${Date.now()}_${Math.random().toString(36).slice(2)}`;
    const timeout = setTimeout(() => {
      delete window[cb];
      reject(new Error('タイムアウト（10秒）'));
    }, 10000);

    window[cb] = data => {
      clearTimeout(timeout);
      delete window[cb];
      document.head.removeChild(script);
      resolve(data);
    };

    const script = document.createElement('script');
    script.src = `${url}&callback=${cb}`;
    script.onerror = () => {
      clearTimeout(timeout);
      delete window[cb];
      reject(new Error('スクリプト読み込みエラー'));
    };
    document.head.appendChild(script);
  });
}

// ============================================================
// フィルター
// ============================================================
function setupFilters() {
  const daySel = el('filter-day');
  const seenDays = new Set();
  seminarData.program.forEach(day => {
    if (!seenDays.has(day.day)) {
      seenDays.add(day.day);
      const tools = seminarData.program
        .filter(p => p.day === day.day).map(p => p.tool).join('・');
      daySel.appendChild(new Option(`Day ${day.day}　${tools}`, day.day));
    }
  });
  updateCaseFilter('');
}

function updateCaseFilter(dayVal) {
  const caseSel = el('filter-case');
  const prev = caseSel.value;
  caseSel.innerHTML = '<option value="">全て</option>';

  const days = dayVal
    ? seminarData.program.filter(d => String(d.day) === String(dayVal))
    : seminarData.program;

  days.forEach(day => {
    day.cases.forEach(c => {
      const label = `Day ${day.day}　${c.title.split('：')[0]}`;
      const val   = `d${day.day}_${c.id}`;
      caseSel.appendChild(new Option(label, val));
    });
  });

  caseSel.value = [...caseSel.options].some(o => o.value === prev) ? prev : '';
  updateQuestionFilter();
}

function updateQuestionFilter() {
  const qSel = el('filter-question');
  if (!qSel) return;
  qSel.innerHTML = '<option value="">全設問</option>';

  const fields = getActiveFields();
  let qNum = 0;
  fields.forEach(([fieldId, field]) => {
    if (fieldId.includes('__')) return; // matrix サブフィールドはスキップ
    if (!['radio','textarea','text','matrix_parts'].includes(field.type)) return;
    qNum++;
    const truncated = field.label.length > 30 ? field.label.slice(0, 30) + '…' : field.label;
    qSel.appendChild(new Option(`Q${qNum}　${truncated}`, fieldId));
  });
}

function getFilteredFields() {
  const qVal = el('filter-question') ? el('filter-question').value : '';
  const fields = getActiveFields();
  if (!qVal) return fields;

  const field = fieldMap[qVal];
  if (field && field.type === 'matrix_parts') {
    return fields.filter(([id]) => id === qVal || id.startsWith(qVal + '__'));
  }
  return fields.filter(([id]) => id === qVal);
}

function onDayChange() {
  updateCaseFilter(el('filter-day').value);
  applyFilter();
}

function onCaseChange() {
  updateQuestionFilter();
  applyFilter();
}

function onSearch() {
  searchQuery = el('search-input').value.trim().toLowerCase();
  applyFilter();
}

// 選択中の case に属するフィールドのみ返す
function getActiveFields() {
  const caseKey = el('filter-case').value; // "d1_case1" or ""
  if (caseKey) {
    const ids = caseFieldMap[caseKey] || [];
    return ids.map(id => [id, fieldMap[id]]).filter(([, f]) => f);
  }
  // Day のみ選択中: そのDayの全caseフィールドを返す
  const dayVal = el('filter-day').value;
  if (dayVal) {
    const ids = [];
    seminarData.program.forEach(prog => {
      if (String(prog.day) === String(dayVal)) {
        prog.cases.forEach(c => {
          (caseFieldMap[`d${prog.day}_${c.id}`] || []).forEach(id => {
            if (!ids.includes(id)) ids.push(id);
          });
        });
      }
    });
    return ids.map(id => [id, fieldMap[id]]).filter(([, f]) => f);
  }
  return Object.entries(fieldMap);
}

function applyFilter() {
  const dayVal  = el('filter-day').value;
  const caseKey = el('filter-case').value;

  let rows = allRows;
  if (caseKey) {
    const m = caseKey.match(/^d(\d+)_(.+)$/);
    if (m) rows = rows.filter(r => String(r.day) === m[1] && r.case_id === m[2]);
  } else if (dayVal) {
    rows = rows.filter(r => String(r.day) === String(dayVal));
  }

  if (searchQuery) {
    rows = rows.filter(r =>
      Object.values(r).some(v => String(v).toLowerCase().includes(searchQuery))
    );
  }

  el('filter-count').textContent = `${rows.length} 件表示中`;

  renderStats(rows);
  renderCharts(rows);
  renderTexts(rows);
  renderTable(rows);
}

// ============================================================
// 統計カード
// ============================================================
function renderStats(rows) {
  const dayCounts = {};
  rows.forEach(r => {
    const k = `Day ${r.day}`;
    dayCounts[k] = (dayCounts[k] || 0) + 1;
  });

  const cards = [
    { label: '総回答数', value: rows.length, color: 'bg-indigo-50 border-indigo-100 text-indigo-700' },
    ...Object.entries(dayCounts).map(([k, v]) => ({
      label: k, value: v,
      color: 'bg-slate-50 border-slate-100 text-slate-700',
    })),
  ];

  el('el-stats').innerHTML = cards.map(c => `
    <div class="${c.color} rounded-2xl border p-4 shadow-sm">
      <div class="text-3xl font-bold">${c.value}</div>
      <div class="text-xs mt-1 opacity-60">${c.label}</div>
    </div>`).join('');
}

// ============================================================
// ラジオ集計グラフ（Chart.js Doughnut）
// ============================================================
const PALETTE = ['#6366f1','#14b8a6','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#84cc16'];

function renderCharts(rows) {
  charts.forEach(c => c.destroy());
  charts = [];
  el('el-charts').innerHTML = '';

  const radioFields = getFilteredFields().filter(([, f]) => f.type === 'radio');
  let hasData = false;

  radioFields.forEach(([fieldId, field]) => {
    const counts = {};
    rows.forEach(r => {
      const v = (r[fieldId] || '').trim();
      if (!v) return; // このcaseに属さない行・未回答はスキップ
      counts[v] = (counts[v] || 0) + 1;
    });

    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    if (total === 0) return;
    hasData = true;

    const div = document.createElement('div');
    div.className = 'bg-white rounded-2xl border border-slate-200 p-4 shadow-sm';
    div.innerHTML = `
      <p class="text-xs font-semibold text-slate-600 mb-1 leading-snug">${field.label}</p>
      <p class="text-xs text-slate-400 mb-3">${total} 件</p>
      <div class="relative h-44"><canvas id="c-${fieldId.replace(/\W/g, '_')}"></canvas></div>`;
    el('el-charts').appendChild(div);

    const ctx = div.querySelector('canvas').getContext('2d');
    charts.push(new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: Object.keys(counts),
        datasets: [{
          data: Object.values(counts),
          backgroundColor: PALETTE,
          borderWidth: 0,
          hoverOffset: 4,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12 } },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.label}：${ctx.raw} 件 (${Math.round(ctx.raw / total * 100)}%)`,
            },
          },
        },
        cutout: '60%',
      },
    }));
  });

  el('el-charts-empty').classList.toggle('hidden', hasData || rows.length > 0);
}

// ============================================================
// テキスト回答テーブル
// ============================================================
function highlight(text) {
  if (!searchQuery) return esc(text);
  const lower = text.toLowerCase();
  let result = '';
  let pos = 0;
  let idx;
  while ((idx = lower.indexOf(searchQuery, pos)) >= 0) {
    result += esc(text.slice(pos, idx));
    result += `<mark class="bg-yellow-200 rounded">${esc(text.slice(idx, idx + searchQuery.length))}</mark>`;
    pos = idx + searchQuery.length;
  }
  result += esc(text.slice(pos));
  return result;
}

function renderTexts(rows) {
  el('el-texts').innerHTML = '';

  const textFields = getFilteredFields()
    .filter(([id, f]) => !id.includes('__') && (f.type === 'textarea' || f.type === 'text'));

  let hasData = false;

  textFields.forEach(([fieldId, field]) => {
    const responses = rows
      .map(r => ({
        name:        (r.name        || '').trim() || '—',
        affiliation: (r.affiliation || '').trim(),
        text:        (r[fieldId]    || '').trim(),
      }))
      .filter(r => r.text);

    if (!responses.length) return;
    hasData = true;

    const div = document.createElement('div');
    div.className = 'bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden';
    div.innerHTML = `
      <div class="bg-slate-50 border-b border-slate-100 px-4 py-3 flex items-center justify-between">
        <p class="text-xs font-semibold text-slate-600 leading-snug">${esc(field.label)}</p>
        <span class="text-xs text-slate-400">${responses.length} 件</span>
      </div>
      <div class="overflow-x-auto max-h-96 overflow-y-auto">
        <table class="w-full text-xs">
          <thead class="bg-slate-50 border-b border-slate-100 sticky top-0">
            <tr>
              <th class="px-3 py-2 text-left font-semibold text-slate-500 whitespace-nowrap w-24">ニックネーム</th>
              <th class="px-3 py-2 text-left font-semibold text-slate-500 whitespace-nowrap w-28">所属</th>
              <th class="px-3 py-2 text-left font-semibold text-slate-500">回答</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-slate-100">
            ${responses.map(r => `
              <tr class="hover:bg-slate-50 transition-colors">
                <td class="px-3 py-2.5 font-medium text-slate-700 whitespace-nowrap">${highlight(r.name)}</td>
                <td class="px-3 py-2.5 text-slate-400 whitespace-nowrap">${r.affiliation ? esc(r.affiliation) : '<span class="text-slate-300">—</span>'}</td>
                <td class="px-3 py-2.5 text-slate-700 whitespace-pre-wrap break-words">${highlight(r.text)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    el('el-texts').appendChild(div);
  });

  el('el-texts-empty').classList.toggle('hidden', hasData || rows.length > 0);
}

// ============================================================
// 回答一覧テーブル
// ============================================================
const TABLE_COLS = ['timestamp', 'name', 'affiliation', 'day', 'case_id'];
const COL_LABELS = {
  timestamp: '日時', name: 'ニックネーム', affiliation: '所属', day: 'Day', case_id: 'Case',
};

function renderTable(rows) {
  const tbl = el('el-table');

  if (!rows.length) {
    tbl.innerHTML = '<tr><td class="p-10 text-center text-slate-400 text-sm">データがありません</td></tr>';
    return;
  }

  // 回答フィールド数を右端に表示
  const answerCols = allHeaders.filter(h => !TABLE_COLS.includes(h) && h !== 'seminar_id');

  const thead = `
    <thead class="bg-slate-50 border-b border-slate-200 sticky top-0">
      <tr>
        ${TABLE_COLS.map(c => `<th class="px-3 py-2 text-left text-xs font-semibold text-slate-500 whitespace-nowrap">${COL_LABELS[c] || c}</th>`).join('')}
        <th class="px-3 py-2 text-left text-xs font-semibold text-slate-500">回答数</th>
      </tr>
    </thead>`;

  const tbody = `
    <tbody class="divide-y divide-slate-100">
      ${rows.map(r => `
        <tr class="hover:bg-slate-50 transition-colors">
          ${TABLE_COLS.map(c => `<td class="px-3 py-2.5 text-slate-700 whitespace-nowrap">${formatCell(c, r[c])}</td>`).join('')}
          <td class="px-3 py-2.5 text-slate-400">${answerCols.filter(k => r[k] && r[k].trim()).length} / ${answerCols.length}</td>
        </tr>`).join('')}
    </tbody>`;

  tbl.innerHTML = thead + tbody;
}

function formatCell(col, val) {
  if (!val || !String(val).trim()) return '<span class="text-slate-300">—</span>';
  if (col === 'timestamp') {
    try { return new Date(val).toLocaleString('ja-JP', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }); }
    catch (_) { return esc(val); }
  }
  const s = String(val);
  return esc(s.length > 30 ? s.slice(0, 30) + '…' : s);
}

// ============================================================
// ユーティリティ
// ============================================================
function el(id)   { return document.getElementById(id); }
function show(id) { el(id).classList.remove('hidden'); }
function hide(id) { el(id).classList.add('hidden'); }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showError(msg) {
  hide('s-loading');
  show('s-error');
  el('error-msg').textContent = msg;
}

// ============================================================
// START
// ============================================================
init();
</script>
</body>
</html>
