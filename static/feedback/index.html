<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Survey</title>
</head>
<body class="bg-light p-4">
  <div class="container bg-white p-4 rounded shadow-sm" style="max-width: 600px;">
    <div id="loading">読み込み中...</div>
    <div id="survey-content" style="display:none;">
        <h3 id="surveyTitle"></h3>
        <p id="description" class="text-muted"></p>
        <form id="surveyForm">
            <input type="hidden" name="userId" id="userId">
            <input type="hidden" name="role" id="role">
            <div id="questions-container"></div>
            <button type="submit" class="btn btn-primary w-100 mt-4">回答を送信する</button>
        </form>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwS8fGIdcVzAiBEvKTRg82-mxkp56weGK7HkaBV6v63rtscJHSHVyeNSsQJW6HTiYDo8A/exec"; // ★ここにデプロイしたURLを貼る

    async function init() {
      // 1. URLパラメータの取得
      const params = new URLSearchParams(window.location.search);
      document.getElementById('userId').value = params.get('userId') || 'Unknown';
      document.getElementById('role').value = params.get('role') || 'Unknown';

      // 2. config.jsonの読み込み (GitHub上の同じフォルダに配置)
      const response = await fetch('config.json');
      const config = await response.json();

      document.getElementById('surveyTitle').innerText = config.surveyTitle;
      document.getElementById('description').innerText = config.description;

      // 3. 設問の動的生成
      const container = document.getElementById('questions-container');
      config.questions.forEach(q => {
        const div = document.createElement('div');
        div.className = "mb-4";
        div.innerHTML = `<label class="form-label fw-bold">${q.label}</label>`;

        if (q.type === 'textarea') {
          div.innerHTML += `<textarea name="${q.id}" class="form-control" rows="3"></textarea>`;
        } else if (q.type === 'range') {
          div.innerHTML += `<input type="range" name="${q.id}" class="form-range" min="${q.min}" max="${q.max}">`;
        }
        // ... 他のタイプも同様に
        container.appendChild(div);
      });

      document.getElementById('loading').style.display = 'none';
      document.getElementById('survey-content').style.display = 'block';
    }

    // 4. GASへのデータ送信
    document.getElementById('surveyForm').onsubmit = async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      data.event_type = "survey_submission";

      // GASへのPOST（CORS対策としてfetchを使用）
      await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(data)
      });

      alert("ご協力ありがとうございました！");
    };

    init();
  </script>
</body>
</html>
